<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--paper); padding: 24px 26px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); width: 100%; margin-bottom: 4px; }
  .stats { display: flex; gap: 40px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Kicker, Badge, Tag, Stat, Avatar } = window.AsiaConnectDesignSystem_f91cce;
    function Demo() {
      return (
        <>
          <div className="row"><span className="lbl">Kicker · Badge</span>
            <Kicker index="01" tick>The Asia-Connect Advantage</Kicker>
            <Badge tone="success" dot>Active mandate</Badge>
            <Badge tone="brass">Interim</Badge>
            <Badge tone="neutral">Singapore HQ</Badge>
            <Badge tone="danger" solid>Crisis</Badge>
          </div>
          <div className="row"><span className="lbl">Tags / sector filters</span>
            <Tag interactive selected>Private Equity</Tag>
            <Tag interactive>Healthcare</Tag>
            <Tag interactive>Energy</Tag>
            <Tag interactive>Consumer</Tag>
          </div>
          <div className="row"><span className="lbl">Stats · Avatars</span>
            <div className="stats">
              <Stat value="< 10 days" label="To deploy" />
              <Stat value="7" label="ASEAN markets" />
              <Stat value="20+" label="Years in region" />
            </div>
            <div style={{display:'flex', gap:10, marginLeft:'auto'}}>
              <Avatar name="Patrick Laredo" ring />
              <Avatar name="Mei Lin" />
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
