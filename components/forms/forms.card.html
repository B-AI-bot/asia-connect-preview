<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--paper); padding: 26px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; align-items: start; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Input, Textarea, Select } = window.AsiaConnectDesignSystem_f91cce;
    function Demo() {
      return (
        <div className="grid">
          <Input label="Work email" type="email" placeholder="you@company.com" defaultValue="cfo@meridian-group.com" />
          <Select label="Engagement type" defaultValue="Crisis & recovery">
            <option>Interim executive</option>
            <option>Project leadership</option>
            <option>Crisis &amp; recovery</option>
          </Select>
          <Input label="Company" error="Please add your company" />
          <Input label="Market" placeholder="Singapore" hint="Where is the mandate based?" />
          <div style={{gridColumn:'1 / -1'}}>
            <Textarea label="Your situation" rows={3} placeholder="Tell us what you're facing…" />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
